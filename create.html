<!DOCTYPE html>
<html>
<head>
    <title>Create</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

  <!-- ADD THESE TWO — order matters, html2canvas before your script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="container">
        <p>Each flower is associated with a unique emotion that the poetry snippets narrate in the growing garden. The prompt you choose is a tiny boundary for the creation you are contributing. Use it with utmost care.</p>
        <h2>Your emotion</h2>
        <p1 id="emotion"></p1>

        <h3>Choose a prompt:</h3>
        <button onclick="selectPrompt(0)" id="p0"></button>
        <button onclick="selectPrompt(1)" id="p1"></button>
        <button onclick="selectPrompt(2)" id="p2"></button>

    </div>
    <div id="gardenContainer" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
    <script src="script.js"></script>
</body>
</html>
