<!DOCTYPE html>
<html>
<head>
  <title>Florilegium Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    .card-page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    .container {
      background: rgba(255,255,255,0.92) !important;
      max-width: 560px;
      width: 100%;
      padding: 32px 36px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      margin: 0;
    }
    .container h2 { font-size: 17px; line-height: 1.6; margin-bottom: 18px; }

    .card {
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(107,142,107,0.25);
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 18px;
      text-align: left;
    }
    .card p { margin: 3px 0; font-size: 13px; color: #5a6e4a; }
    #cardPoem {
      font-family: 'Playfair Display', serif;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.8;
      color: #2f3e2f;
      margin-top: 10px;
    }

    #gardenMessage { font-size: 15px; color: #4a6741; margin: 10px 0 4px; }
    #fragment {
      font-family: 'Dancing Script', cursive;
      font-size: 14px;
      color: #7a9e7a;
      margin-bottom: 14px;
    }

    /* ── Garden grid on card page ── */
    #gardenSection { width: 100%; max-width: 700px; margin-top: 40px; }
    #gardenSection h3 {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      color: #3b4a2f;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 0.03em;
    }
    #gardenSection #gardenContainer {
      display: grid !important;
      position: static !important;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 24px;
      background: rgba(255,255,255,0.86);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      min-height: 160px;
      align-items: start;
    }

    /* ── Overlay ── */
    #cardOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
      overflow-y: auto;
      z-index: 1000;
    }
    #cardOverlay.hidden { display: none !important; }

    #cardPopup {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border-radius: 25px;
      animation: popBloom 0.4s cubic-bezier(0.34,1.56,0.64,1);
      width: 100%;
      max-width: 420px;
    }

    .closeBtn {
      position: absolute;
      top: -16px;
      right: -4px;
      background: #fff;
      border-radius: 50%;
      border: none;
      width: 36px; height: 36px;
      font-size: 20px;
      line-height: 36px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,0.22);
      z-index: 20;
      padding: 0;
      color: #3b4a2f;
      transition: background 0.15s, transform 0.15s;
    }
    .closeBtn:hover { background: #fde8e8; transform: scale(1.1) rotate(8deg); }

    /* ── Card design — stamp never cropped ── */
    #cardDesign {
      position: relative !important;
      width: 100% !important;
      max-width: 380px !important;
      height: 540px !important;
      border-radius: 22px !important;
      overflow: hidden !important;
      box-shadow: 0 14px 44px rgba(0,0,0,0.28) !important;
    }

    #cardBg {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      object-position: top right !important;
      z-index: 0 !important;
    }

    #cardDesign::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        170deg,
        rgba(255,255,255,0.04) 0%,
        rgba(255,255,255,0.48) 28%,
        rgba(255,255,255,0.80) 100%
      );
      z-index: 1;
    }

    #popupPoem {
      position: absolute !important;
      inset: 0 !important;
      z-index: 2 !important;
      padding: 80px 36px 36px 36px !important;
      color: #2a3820 !important;
      font-family: 'Playfair Display', serif !important;
      font-size: 13.5px;       /* no !important — lets mobile media query override */
      line-height: 1.85;       /* no !important — lets mobile media query override */
      text-align: left !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      align-items: flex-start !important;
      overflow: hidden !important;
    }

    #popupPoem span {
      display: inline;
      white-space: pre;
    }

    /* ── Flower token ── */
    #flowerToken {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #flowerTokenImg {
      width: 90px; height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
      animation: sway 3.5s ease-in-out infinite;
    }

    #popupFragment {
      font-family: 'Dancing Script', cursive;
      color: #f0e68c;
      font-size: 15px;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
    }

    /* ── Garden button — replaces save/share ── */
    #gardenBtn {
      font-family: 'Dancing Script', cursive;
      font-size: 16px;
      background: #6b8e6b;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 26px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin: 0 0 20px 0;
      letter-spacing: 0.02em;
    }
    #gardenBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 16px rgba(107,142,107,0.5);
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-4deg) translateY(0); }
      50%       { transform: rotate(4deg) translateY(-3px); }
    }
    @keyframes popBloom {
      from { transform: scale(0.72); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    @media (max-width: 480px) {
      #cardDesign { height: 480px !important; }
      .container  { padding: 22px 18px; }
      #cardPopup  { gap: 10px; }
      .closeBtn   { top: -14px; right: -2px; width: 32px; height: 32px; font-size: 18px; line-height: 32px; }
    }

  </style>
</head>
<body>
<div class="card-page-wrapper">

  <div class="container">
    <h2>A trace of your poetry is held gently in the garden 🌿</h2>
    <p>Don't forget to keep your stamped-card showing your planted flower. The stamp is hand-made!</p>
    <div class="card">
      <p id="cardEmotion"></p>
      <p id="cardPrompt"></p>
      <pre id="cardPoem"></pre>
    </div>
    <h3 id="gardenMessage"></h3>
    <p id="fragment"></p>
    <button onclick="openCardPopup()">Generate Card 🌸</button>
  </div>

  <div id="gardenSection">
    <h3>the garden 🌿</h3>
    <div id="gardenContainer">
      <p class="garden-empty">your garden is waiting for its first bloom...</p>
    </div>
  </div>

</div>

<!-- Popup overlay -->
<div id="cardOverlay" class="hidden">
  <div id="cardPopup">

    <button class="closeBtn" onclick="closeCard()">×</button>

    <div id="cardDesign">
      <img id="cardBg" src="images/floral_card.png" alt="card background">
      <p id="popupPoem"></p>
    </div>

    <div id="flowerToken">
      <img id="flowerTokenImg" src="" alt="your flower">
    </div>

    <div id="popupFragment"></div>

    <!-- Single CTA: view the full collective garden -->
    <button id="gardenBtn" onclick="window.location.href='garden.html'">
      View the garden 🌸
    </button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
